name: Deploy Site

on:
  push:
    branches:
      - main
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure Pages is enabled
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            try {
              await github.rest.repos.getPages({ owner, repo });
              core.info("GitHub Pages is already enabled.");
            } catch (error) {
              if (error.status === 404) {
                core.info("Pages not found; creating site with workflow build type.");
                await github.rest.repos.createPagesSite({
                  owner,
                  repo,
                  build_type: "workflow"
                });
                core.info("GitHub Pages has been enabled.");
              } else {
                throw error;
              }
            }

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
