name: Repo Sleep Doctor

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run lint
        run: npm run lint

      - name: Run tests (non-blocking)
        id: tests
        continue-on-error: true
        run: npm test

      - name: Run build
        run: npm run build

      - name: Test status note
        if: steps.tests.outcome != 'success'
        run: echo "::warning::Tests failed in CI environment, scan continues for release-risk visibility."

      - name: Scan repository (PR diff)
        if: github.event_name == 'pull_request'
        run: |
          node src/cli.js . --changed-since "${{ github.event.pull_request.base.sha }}" --preset security --format sarif --out reports/scan-security.sarif --fail-on p0
          node src/cli.js . --changed-since "${{ github.event.pull_request.base.sha }}" --preset security --format text --fail-on p0
          node src/cli.js . --changed-since "${{ github.event.pull_request.base.sha }}" --preset release --format junit --out reports/scan-release.junit.xml --fail-on p0
          node src/cli.js . --changed-since "${{ github.event.pull_request.base.sha }}" --preset release --format text --fail-on p0

      - name: Scan repository (full on main)
        if: github.event_name != 'pull_request'
        run: |
          node src/cli.js . --preset security --format sarif --out reports/scan-security.sarif --fail-on p0
          node src/cli.js . --preset security --format text --fail-on p0
          node src/cli.js . --preset release --format junit --out reports/scan-release.junit.xml --fail-on p0
          node src/cli.js . --preset release --format text --fail-on p0
          node src/cli.js . --preset release --history-file reports/history.json --history-limit 200 --format text --fail-on none

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: reports/scan-security.sarif

      - name: Upload scan artifact
        uses: actions/upload-artifact@v4
        with:
          name: repo-sleep-doctor-report
          path: |
            reports/scan-security.sarif
            reports/scan-release.junit.xml
            reports/history.json
